<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер</title>
    <style>
        #videoContainer {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        video {
            width: 100%;
        }
        button {
            margin: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }
        input[type="range"] {
            width: 100%;
        }
        .back-cont {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 32px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div id="videoContainer">
        <h2>Мой видео плеер</h2>
        <video id="myVideo" controls>
            <source src="video.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
        <div>
            <button onclick="playPause()">▶️ / ⏸ Воспроизвести / Пауза</button>
            <button onclick="toggleFullScreen()">⛶ На весь экран</button>
        </div>
        <div>
            Громкость:
            <input type="range" min="0" max="1" step="0.1" value="1" onchange="setVolume(this.value)">
        </div>
        <div class="back-cont">
            <a href="/">Вернуться</a>
        </div>
    </div>

    <script>


    </script>
</body>
</html>
